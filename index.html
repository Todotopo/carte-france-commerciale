<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Zones d'intervention – Carte France</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #dce8f0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #header {
            background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
            color: white;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.18);
        }
        #header h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
        #header p  { font-size: 11px; opacity: 0.82; margin-top: 1px; }
        #header-left { display: flex; flex-direction: column; }
        #header-right { font-size: 11px; opacity: 0.7; text-align: right; }

        #map-container { flex: 1; position: relative; overflow: hidden; }
        #map-svg { width: 100%; height: 100%; display: block; }
        .dept-path { stroke: #7a9ab8; stroke-width: 0.5px; }

        #legend {
            position: absolute; bottom: 14px; left: 14px;
            background: rgba(255,255,255,0.93);
            border: 1px solid rgba(0,0,0,0.12);
            border-radius: 10px; padding: 10px 14px;
            box-shadow: 0 2px 14px rgba(0,0,0,0.13);
            min-width: 160px; pointer-events: none;
        }
        #legend-title {
            font-size: 9.5px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: #475569; margin-bottom: 8px;
        }
        .leg-row {
            display: flex; align-items: center;
            gap: 8px; margin: 5px 0;
            font-size: 12px; color: #1e293b; line-height: 1.35;
        }
        .leg-dot {
            width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12);
        }

        #qr-box {
            position: absolute; bottom: 14px; right: 14px;
            background: rgba(255,255,255,0.93);
            border: 1px solid rgba(0,0,0,0.12);
            border-radius: 10px; padding: 10px;
            box-shadow: 0 2px 14px rgba(0,0,0,0.13);
            display: flex; flex-direction: column;
            align-items: center; gap: 5px;
        }
        #qr-canvas { width: 100px; height: 100px; }
        #qr-label { font-size: 9px; color: #64748b; text-align: center; max-width: 100px; line-height: 1.3; }

        #zoom-hint {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255,255,255,0.82);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 8px; padding: 5px 10px;
            font-size: 10px; color: #64748b; pointer-events: none;
        }

        @media (max-width: 600px) {
            #header h1 { font-size: 14px; }
            #header p  { font-size: 10px; }
            #header-right { display: none; }
            #qr-box { display: none; }
            .leg-row { font-size: 11px; }
            #zoom-hint { display: none; }
        }
    </style>
</head>
<body>

<div id="header">
    <div id="header-left">
        <h1>Zones d'intervention &ndash; France</h1>
        <p>Tarification par d&eacute;partement</p>
    </div>
    <div id="header-right">
        Scannez le QR code<br>pour acc&eacute;der depuis<br>votre smartphone
    </div>
</div>

<div id="map-container">
    <svg id="map-svg"></svg>

    <div id="legend">
        <div id="legend-title">L&eacute;gende</div>
        <div class="leg-row">
            <div class="leg-dot" style="background:#22c55e"></div>
            Tarif BPU National
        </div>
        <div class="leg-row">
            <div class="leg-dot" style="background:#f97316"></div>
            <span>Plus value chantier IDF<br>ou &eacute;loign&eacute;</span>
        </div>
    </div>

    <div id="qr-box">
        <canvas id="qr-canvas"></canvas>
        <div id="qr-label">Scanner pour ouvrir sur mobile</div>
    </div>

    <div id="zoom-hint">&#128241; Molette ou pincement pour zoomer</div>
</div>

<script>
const GREEN  = '#22c55e';
const ORANGE = '#f97316';

const DEPT_COLORS = {
    '01': GREEN,  '04': GREEN,  '05': GREEN,  '06': GREEN,  '07': GREEN,
    '10': GREEN,  '13': GREEN,  '14': GREEN,  '21': GREEN,  '22': GREEN,
    '25': GREEN,  '26': GREEN,  '29': GREEN,  '30': GREEN,  '35': GREEN,
    '38': GREEN,  '39': GREEN,  '42': GREEN,  '43': GREEN,  '44': GREEN,
    '49': GREEN,  '50': GREEN,  '52': GREEN,  '53': GREEN,  '56': GREEN,
    '68': GREEN,  '69': GREEN,  '70': GREEN,  '71': GREEN,  '73': GREEN,
    '74': GREEN,  '83': GREEN,  '84': GREEN,  '88': GREEN,  '90': GREEN,

    '02': ORANGE, '03': ORANGE, '08': ORANGE, '11': ORANGE, '12': ORANGE,
    '15': ORANGE, '16': ORANGE, '17': ORANGE, '18': ORANGE, '19': ORANGE,
    '23': ORANGE, '27': ORANGE, '28': ORANGE, '34': ORANGE, '36': ORANGE,
    '37': ORANGE, '41': ORANGE, '45': ORANGE, '46': ORANGE, '48': ORANGE,
    '51': ORANGE, '54': ORANGE, '55': ORANGE, '57': ORANGE, '58': ORANGE,
    '59': ORANGE, '60': ORANGE, '61': ORANGE, '62': ORANGE, '63': ORANGE,
    '66': ORANGE, '67': ORANGE, '72': ORANGE, '75': ORANGE, '76': ORANGE,
    '77': ORANGE, '78': ORANGE, '79': ORANGE, '80': ORANGE, '81': ORANGE,
    '82': ORANGE, '85': ORANGE, '86': ORANGE, '87': ORANGE, '89': ORANGE,
    '91': ORANGE, '92': ORANGE, '93': ORANGE, '94': ORANGE, '95': ORANGE,
};

const OVERSEAS  = ['971','972','973','974','976'];
const FILL_NONE = '#f0f5f9';

function generateQR() {
    const url = window.location.href;
    const api = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(url) + '&bgcolor=ffffff&color=1e3a5f&margin=4&format=png';
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
        const canvas = document.getElementById('qr-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 200; canvas.height = 200;
        ctx.drawImage(img, 0, 0, 200, 200);
    };
    img.src = api;
}

async function loadMap() {
    const r   = await fetch('https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/departements.geojson');
    const geo = (await r.json()).features;
    renderMap(geo);
}

function renderMap(geo) {
    const container = document.getElementById('map-container');
    const svgSel    = d3.select('#map-svg');
    svgSel.selectAll('*').remove();

    const W = container.clientWidth;
    const H = container.clientHeight;
    svgSel.attr('width', W).attr('height', H);

    const metro   = geo.filter(function(f) { return !OVERSEAS.includes(f.properties.code); });
    const outre   = geo.filter(function(f) { return  OVERSEAS.includes(f.properties.code); });
    const metroGC = { type: 'FeatureCollection', features: metro };

    const overseasW = 90;
    const mapW      = W - overseasW - 8;

    const proj = d3.geoConicConformal()
        .center([2.454071, 46.279229])
        .parallels([44, 49])
        .fitExtent([[8, 8], [mapW, H - 8]], metroGC);
    const pathGen = d3.geoPath().projection(proj);

    svgSel.append('rect').attr('width', W).attr('height', H).attr('fill', '#cfe3f3');

    const zoomLayer = svgSel.append('g');
    const zoom = d3.zoom().scaleExtent([0.4, 20])
        .on('zoom', function(e) { zoomLayer.attr('transform', e.transform); });
    svgSel.call(zoom);

    metro.forEach(function(f) {
        const code = f.properties.code;
        const name = f.properties.nom;
        const c    = pathGen.centroid(f);
        const area = pathGen.area(f);
        const fill = DEPT_COLORS[code] || FILL_NONE;

        zoomLayer.append('path').datum(f)
            .attr('class', 'dept-path').attr('d', pathGen).attr('fill', fill);

        if (isNaN(c[0]) || isNaN(c[1]) || area < 90) return;

        const fs    = Math.max(7, Math.min(13, Math.sqrt(area) / 3.8));
        const showN = area > 900;
        const textColor = fill === FILL_NONE ? '#374151' : '#fff';
        const shadow    = fill === FILL_NONE ? '0 0 3px rgba(255,255,255,0.8)' : '0 0 3px rgba(0,0,0,0.35)';

        zoomLayer.append('text')
            .attr('x', c[0]).attr('y', showN ? c[1] - fs * 0.55 : c[1])
            .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
            .attr('font-size', fs + 'px').attr('font-weight', '800')
            .attr('fill', textColor).attr('pointer-events', 'none')
            .style('text-shadow', shadow).text(code);

        if (showN) {
            const nfs = Math.max(6, Math.min(10, fs * 0.72));
            const display = area > 3000 ? name
                          : area > 1500 ? name.split(/[-\s]/)[0].substring(0, 14)
                          :               name.split(/[-\s]/)[0].substring(0, 10);
            zoomLayer.append('text')
                .attr('x', c[0]).attr('y', c[1] + fs * 0.65)
                .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
                .attr('font-size', nfs + 'px').attr('font-weight', '500')
                .attr('fill', textColor).attr('pointer-events', 'none')
                .style('text-shadow', shadow).text(display);
        }
    });

    const insetH = Math.floor((H - 20) / outre.length) - 6;
    const insetX = mapW + 8;

    outre.forEach(function(f, i) {
        const code = f.properties.code;
        const name = f.properties.nom;
        const y    = 10 + i * (insetH + 6);
        const fill = DEPT_COLORS[code] || FILL_NONE;

        svgSel.append('rect')
            .attr('x', insetX).attr('y', y)
            .attr('width', overseasW - 2).attr('height', insetH)
            .attr('rx', 5).attr('fill', 'rgba(255,255,255,0.7)')
            .attr('stroke', '#9bb4c8').attr('stroke-width', 0.7);

        const iProj = d3.geoMercator().fitExtent(
            [[insetX + 2, y + 13], [insetX + overseasW - 4, y + insetH - 3]], f
        );
        const iPath = d3.geoPath().projection(iProj);
        const c     = iPath.centroid(f);

        svgSel.append('text')
            .attr('x', insetX + (overseasW - 2) / 2).attr('y', y + 9)
            .attr('text-anchor', 'middle')
            .attr('font-size', '7.5px').attr('font-weight', '700').attr('fill', '#475569')
            .text(code + ' - ' + name.substring(0, 12));

        svgSel.append('path').datum(f)
            .attr('class', 'dept-path').attr('d', iPath).attr('fill', fill);

        if (!isNaN(c[0]) && !isNaN(c[1])) {
            const tc = fill === FILL_NONE ? '#374151' : '#fff';
            svgSel.append('text')
                .attr('x', c[0]).attr('y', c[1])
                .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
                .attr('font-size', '8px').attr('font-weight', '700')
                .attr('fill', tc).attr('pointer-events', 'none').text(code);
        }
    });
}

loadMap();
generateQR();

var rz;
window.addEventListener('resize', function() {
    clearTimeout(rz);
    rz = setTimeout(function() { loadMap(); }, 180);
});
</script>
</body>
</html>
